name: Update Wordle RSS feed

on:
  schedule:
    # Run once per day at 05:00 UTC
    - cron: "0 5 * * *"
  # Allow manual runs from the GitHub UI
  workflow_dispatch:

jobs:
  update-feed:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Update Wordle RSS feed
        run: |
          python fetch_wordle_to_rss.py

      - name: Commit and push changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add wordle_feed.xml
          COMMIT_DATE="$(date -u +'%Y-%m-%d')"
          git commit -m "chore: update Wordle RSS feed for ${COMMIT_DATE}"
          git push

